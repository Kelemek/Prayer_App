name: Daily Database Backup (API Method)

on:
  schedule:
    # Run daily at 2 AM CST (8 AM UTC)
    - cron: '0 8 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  backup:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          # Match @capacitor/cli (and lockfile) engines; npm install in repo root validates the full tree
          node-version: '22'
      
      - name: Create backup directory
        id: backup_stamp
        run: |
          mkdir -p backups
          STAMP=$(date +'%Y-%m-%d_%H-%M-%S')
          echo "date=$STAMP" >> "$GITHUB_OUTPUT"
          echo "BACKUP_DATE=$STAMP" >> "$GITHUB_ENV"

      # Isolated install: root `npm install @supabase/supabase-js` pulls the whole app (1000+ pkgs, deprecations, audit noise).
      - name: Install Supabase client (isolated)
        run: |
          mkdir -p .ci-backup-deps
          cd .ci-backup-deps
          printf '%s\n' '{"name":"ci-backup-deps","private":true,"type":"module"}' > package.json
          npm install @supabase/supabase-js@2 --omit=dev --no-audit --no-fund

      - name: Create backup script
        run: |
          cat > .ci-backup-deps/backup-script.mjs << 'EOF'
          import { createClient } from '@supabase/supabase-js';
          import fs from 'fs';
          import path from 'path';
          import { fileURLToPath } from 'url';

          const repoRoot = path.resolve(path.dirname(fileURLToPath(import.meta.url)), '..');
          const backupsDir = path.join(repoRoot, 'backups');

          async function backupDatabase() {
            const supabase = createClient(
              process.env.SUPABASE_URL,
              process.env.SUPABASE_SECRET_KEY
            );

            const startTime = Date.now();
            console.log('Discovering tables to backup...');
            
            // Auto-discover all tables from the database
            const { data: tableList, error: tableError } = await supabase
              .from('backup_tables')
              .select('table_name')
              .order('table_name');

            if (tableError) {
              console.error('Error fetching table list:', tableError);
              // Fallback to hardcoded list if view doesn't exist yet
              var tables = [
                'admin_settings',
                'analytics',
                'backup_logs',
                'email_subscribers',
                'email_templates',
                'prayer_prompts',
                'prayer_types',
                'prayer_updates',
                'prayers',
                'update_deletion_requests',
                'user_preferences'
              ];
            } else {
              var tables = tableList.map(t => t.table_name);
            }

            console.log(`Found ${tables.length} tables to backup:`, tables);

            const backup = {
              timestamp: new Date().toISOString(),
              version: '1.0',
              tables: {}
            };

            for (const table of tables) {
              try {
                console.log(`Backing up table: ${table}...`);
                const { data, error } = await supabase
                  .from(table)
                  .select('*');
                
                if (error && error.code !== 'PGRST116') {
                  console.error(`Error backing up ${table}:`, error);
                  backup.tables[table] = { error: error.message, data: [] };
                } else {
                  backup.tables[table] = { count: data?.length || 0, data: data || [] };
                  console.log(`✓ Backed up ${data?.length || 0} rows from ${table}`);
                }
              } catch (err) {
                console.error(`Exception backing up ${table}:`, err);
                backup.tables[table] = { error: err.message, data: [] };
              }
            }

            // Save backup as JSON
            const filename = path.join(backupsDir, `backup_${process.env.BACKUP_DATE}.json`);
            fs.writeFileSync(filename, JSON.stringify(backup, null, 2));
            console.log(`\n✓ Backup saved to ${filename}`);

            // Calculate duration
            const endTime = Date.now();
            const durationSeconds = Math.round((endTime - startTime) / 1000);

            // Create summary
            const summary = {
              timestamp: backup.timestamp,
              date: process.env.BACKUP_DATE,
              type: 'api',
              format: 'json',
              tables: Object.keys(backup.tables).reduce((acc, table) => {
                acc[table] = backup.tables[table].count || 0;
                return acc;
              }, {})
            };

            fs.writeFileSync(
              path.join(backupsDir, `backup_${process.env.BACKUP_DATE}_summary.json`),
              JSON.stringify(summary, null, 2)
            );

            console.log('\nBackup Summary:');
            console.log(JSON.stringify(summary, null, 2));

            // Log backup to database (keeps free tier active)
            const totalRecords = Object.values(summary.tables).reduce((sum, count) => sum + count, 0);
            
            try {
              const { error: logError } = await supabase
                .from('backup_logs')
                .insert({
                  backup_date: new Date().toISOString(),
                  status: 'success',
                  tables_backed_up: summary.tables,
                  total_records: totalRecords,
                  duration_seconds: durationSeconds
                });

              if (logError) {
                console.error('Warning: Failed to log backup to database:', logError);
              } else {
                console.log('✓ Backup logged to database');
              }
            } catch (logErr) {
              console.error('Warning: Exception logging backup:', logErr);
            }

            // Clean up old backup logs (keep last 30 days)
            try {
              const thirtyDaysAgo = new Date();
              thirtyDaysAgo.setDate(thirtyDaysAgo.getDate() - 30);
              
              const { data: deletedLogs, error: deleteError } = await supabase
                .from('backup_logs')
                .delete()
                .lt('created_at', thirtyDaysAgo.toISOString())
                .select('id');

              if (deleteError) {
                console.error('Warning: Failed to clean up old backup logs:', deleteError);
              } else if (deletedLogs && deletedLogs.length > 0) {
                console.log(`✓ Cleaned up ${deletedLogs.length} old backup log(s)`);
              } else {
                console.log('✓ No old backup logs to clean up');
              }
            } catch (cleanupErr) {
              console.error('Warning: Exception cleaning up old logs:', cleanupErr);
            }
          }

          backupDatabase().catch(async err => {
            console.error('Backup failed:', err);
            
            // Try to log the failure
            try {
              const supabase = createClient(
                process.env.SUPABASE_URL,
                process.env.SUPABASE_SECRET_KEY
              );
              
              await supabase.from('backup_logs').insert({
                backup_date: new Date().toISOString(),
                status: 'failed',
                error_message: err.message || String(err),
                total_records: 0
              });
            } catch (logErr) {
              console.error('Could not log failure:', logErr);
            }
            
            process.exit(1);
          });
          EOF
      
      - name: Run backup
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
          BACKUP_DATE: ${{ steps.backup_stamp.outputs.date }}
        run: |
          node .ci-backup-deps/backup-script.mjs

      - name: Compress backup
        run: |
          cd backups
          gzip "backup_${{ steps.backup_stamp.outputs.date }}.json"
          echo "✓ Backup compressed"

      - name: Upload backup as artifact
        uses: actions/upload-artifact@v4
        with:
          name: database-backup-${{ steps.backup_stamp.outputs.date }}
          path: backups/backup_${{ steps.backup_stamp.outputs.date }}.json.gz
          retention-days: 30
